version: 2
updates:
  # npm dependencies — one grouped PR per week, so updates arrive tested (CI runs on PRs)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns: ['*']

  # keep the GitHub Actions (checkout, setup-node, etc.) up to date too
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
